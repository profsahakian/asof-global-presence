<title>ASOF Members Map — Fellows & Friends</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0f172a; overflow: hidden; }
  
  #map { width: 100%; height: 100vh; background: #0f172a; }
  
  .header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    background: linear-gradient(180deg, rgba(15,23,42,0.95) 0%, rgba(15,23,42,0.7) 70%, transparent 100%);
    padding: 20px 24px 40px;
    pointer-events: none;
  }
  .header h1 {
    font-size: 22px; font-weight: 700; color: #f8fafc;
    letter-spacing: -0.02em;
  }
  .header p {
    font-size: 13px; color: #94a3b8; margin-top: 4px;
  }
  
  .stats-box {
    position: absolute; bottom: 28px; right: 16px; z-index: 1000;
    background: rgba(15,23,42,0.92); backdrop-filter: blur(12px);
    border: 1px solid rgba(148,163,184,0.15);
    border-radius: 12px; padding: 14px 18px;
    font-size: 13px; color: #e2e8f0;
    text-align: right;
  }
  .stats-box .big { font-size: 28px; font-weight: 700; color: #f8fafc; line-height: 1; }
  .stats-box .label { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stats-box .sub { color: #94a3b8; font-size: 12px; margin-top: 6px; }
  
  .panel {
    position: absolute; top: 0; right: -400px; width: 380px; height: 100vh;
    background: rgba(15,23,42,0.97); backdrop-filter: blur(16px);
    border-left: 1px solid rgba(148,163,184,0.15);
    z-index: 1100; transition: right 0.3s ease;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel.open { right: 0; }
  
  .panel-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid rgba(148,163,184,0.1);
    flex-shrink: 0;
  }
  .panel-header h2 {
    font-size: 18px; font-weight: 700; color: #f8fafc;
    display: flex; align-items: center; gap: 8px;
    padding-right: 40px;
  }
  .panel-header .count-badge {
    background: rgba(217,119,6,0.2); color: #fbbf24;
    font-size: 13px; font-weight: 600;
    padding: 2px 10px; border-radius: 12px;
    flex-shrink: 0;
  }
  .panel-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(148,163,184,0.15); border: none;
    color: #94a3b8; width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
  }
  .panel-close:hover { background: rgba(148,163,184,0.25); color: #f8fafc; }
  
  .panel-list {
    flex: 1; overflow-y: auto; padding: 8px 12px;
  }
  .panel-list::-webkit-scrollbar { width: 6px; }
  .panel-list::-webkit-scrollbar-track { background: transparent; }
  .panel-list::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.2); border-radius: 3px; }
  
  .member-item {
    padding: 10px 12px;
    border-radius: 8px;
    transition: background 0.15s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .member-item:hover { background: rgba(148,163,184,0.08); }
  .member-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #D97706; flex-shrink: 0;
    margin-top: 6px;
  }
  .member-name {
    font-size: 14px; color: #e2e8f0; font-weight: 500;
  }
  .member-affil {
    font-size: 12px; color: #64748b; margin-top: 2px;
    line-height: 1.4;
  }
  
  .country-label {
    background: rgba(217,119,6,0.85);
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .country-label:hover {
    transform: scale(1.15);
    box-shadow: 0 4px 16px rgba(217,119,6,0.5);
  }
  .country-label.big {
    width: 44px; height: 44px; font-size: 15px;
    background: rgba(217,119,6,0.95);
  }
  .country-label.huge {
    width: 52px; height: 52px; font-size: 17px;
    background: #D97706;
    border: 2px solid rgba(255,255,255,0.5);
  }
  
  .panel-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1050;
    display: none;
  }
  .panel-overlay.active { display: block; }
</style>
</head>

function loadScript(url) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = url;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

(function() {
  var link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
  document.head.appendChild(link);
})();

loadScript('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js')
  .then(function() { initMap(); })
  .catch(function() {
    document.getElementById('map').innerHTML = '<div style="color:#f87171;padding:40px;text-align:center;">Failed to load map. Please refresh.</div>';
  });

function initMap() {
  var map = L.map('map', {
    center: [30, 10],
    zoom: 3,
    minZoom: 2,
    maxZoom: 10,
    zoomControl: false,
    worldCopyJump: true
  });

  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  for (var region in REGION_DATA) {
    var center = REGION_CENTERS[region];
    if (!center) continue;
    
    var count = REGION_DATA[region].length;
    var sizeClass = count >= 50 ? 'huge' : count >= 10 ? 'big' : '';
    
    var icon = L.divIcon({
      className: '',
      html: '<div class="country-label ' + sizeClass + '">' + count + '</div>',
      iconSize: [sizeClass === 'huge' ? 52 : sizeClass === 'big' ? 44 : 36, 
                 sizeClass === 'huge' ? 52 : sizeClass === 'big' ? 44 : 36],
      iconAnchor: [sizeClass === 'huge' ? 26 : sizeClass === 'big' ? 22 : 18,
                   sizeClass === 'huge' ? 26 : sizeClass === 'big' ? 22 : 18]
    });
    
    var marker = L.marker(center, { icon: icon, interactive: true });
    (function(r) {
      marker.on('click', function(e) {
        L.DomEvent.stopPropagation(e);
        openPanel(r);
      });
    })(region);
    marker.addTo(map);
  }

  map.on('click', function() { closePanel(); });
}

var panel = document.getElementById('panel');
var panelTitle = document.getElementById('panel-title');
var panelList = document.getElementById('panel-list');
var panelClose = document.getElementById('panel-close');
var panelOverlay = document.getElementById('panel-overlay');

panelClose.addEventListener('click', function() { closePanel(); });
panelOverlay.addEventListener('click', function() { closePanel(); });

function closePanel() {
  panel.classList.remove('open');
  panelOverlay.classList.remove('active');
}

function openPanel(region) {
  var members = REGION_DATA[region];
  if (!members) return;
  
  panelTitle.innerHTML = region + ' <span class="count-badge">' + members.length + '</span>';
  
  var html = '';
  for (var i = 0; i < members.length; i++) {
    var m = members[i];
    html += '<div class="member-item">';
    html += '<div class="member-dot"></div>';
    html += '<div><div class="member-name">' + m.name + '</div>';
    if (m.affiliation) {
      html += '<div class="member-affil">' + m.affiliation + '</div>';
    }
    html += '</div></div>';
  }
  
  panelList.innerHTML = html;
  panel.classList.add('open');
  panelOverlay.classList.add('active');
}
